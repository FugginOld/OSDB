name: Stable Base Matrix

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/wizard.js'
      - 'scripts/tests/**'
      - '.github/workflows/stable-matrix.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/wizard.js'
      - 'scripts/tests/**'
      - '.github/workflows/stable-matrix.yml'

permissions:
  contents: read

jobs:
  snapshot-tests:
    name: Snapshot tests for canonical configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run snapshot tests
        run: node scripts/tests/run-snapshot-tests.cjs

  stable-matrix:
    name: Validate stable base default matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate stable-base test scripts
        run: node scripts/tests/generate-stable-base-tests.cjs

      - name: Verify permissions of test scripts
        run: |
          bad=0
          while IFS= read -r -d '' f; do
            mode="$(stat -c '%a' "$f")"
            if [ "$mode" != "755" ]; then
              echo "Incorrect mode $mode: $f (expected 755)"
              bad=1
            fi
          done < <(find scripts/tests -name '*.sh' -print0)
          if [ "$bad" -ne 0 ]; then
            echo
            echo "Fix with:"
            echo "  find scripts/tests -name '*.sh' -exec chmod 755 {} +"
            exit 1
          fi

      - name: Ensure generated test scripts are up to date
        run: git diff --exit-code -- scripts/tests

      - name: Run mirror URL injection tests
        run: node scripts/tests/test-mirror-url-injection.cjs

      - name: Run QEMU binary selection tests
        run: node scripts/tests/test-qemu-binary-selection.cjs

      - name: Run stable default matrix tests
        run: bash scripts/tests/run-stable-default-matrix.sh
