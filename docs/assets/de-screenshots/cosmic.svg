<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="de-title de-desc">
  <title id="de-title">COSMIC desktop environment preview</title>
  <desc id="de-desc">COSMIC by System76 with top panel, left dock, COSMIC Files and COSMIC Terminal.</desc>
  <defs>
    <linearGradient id="cos_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1b2e"/>
      <stop offset="100%" stop-color="#111120"/>
