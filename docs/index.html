<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Distro Builder Wizard</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Apply saved or system theme before first paint to avoid flash
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🐧 Distro Builder Wizard</h1>
    <div class="distro-name-wrap">
      <label for="distro-name">Name:</label>
      <input type="text" id="distro-name" placeholder="MyDistro" maxlength="40" autocomplete="off" />
    </div>
    <button class="theme-btn" id="theme-toggle" aria-label="Switch to dark theme" title="Toggle theme">🌙</button>
  </div>
  <div id="progress-bar" role="list" aria-label="Wizard steps"></div>
</header>

<main>
  <div id="step-container" role="region" aria-live="polite"></div>
  <div class="nav-buttons">
    <button id="btn-prev" aria-label="Go to previous step">← Back</button>
    <button id="btn-next" aria-label="Go to next step">Next →</button>
  </div>
</main>

<script src="wizard.js"></script>
<script>
  (function () {
    const btn = document.getElementById('theme-toggle');
    const root = document.documentElement;

    function getTheme() {
      return root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    }

    function updateUI(theme) {
      if (theme === 'dark') {
        root.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️';
        btn.setAttribute('aria-label', 'Switch to light theme');
      } else {
        root.removeAttribute('data-theme');
        btn.textContent = '🌙';
        btn.setAttribute('aria-label', 'Switch to dark theme');
      }
    }

    // Sync button icon/label with already-applied theme (no localStorage write)
    updateUI(getTheme());

    btn.addEventListener('click', function () {
      const next = getTheme() === 'dark' ? 'light' : 'dark';
      updateUI(next);
      localStorage.setItem('theme', next);
    });
  })();
</script>
</body>
</html>
